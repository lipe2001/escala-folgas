{% import 'components/day-week.html' as day %} {% extends "components/base.html"
%} {% block title %}Folgas{% endblock %}
{% set active_page = "weekend" %}
{% block content %} {% include
"components/header.html" %}
<div class="min-h-screen flex justify-center bg-gray-50 py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full h-fit space-y-8 bg-white p-10 rounded-xl shadow-2xl">
        <div>
            <div class="p-4 text-white size-fit  bg-indigo-500 mx-auto rounded-full ">
                <i class="fa-solid fa-user size-2.5"></i>
            </div>

            <h2 class="mt-6 text-center text-3xl font-extrabold text-gray-900">
                Bem-vindo
            </h2>
            <p class="mt-2 text-center text-sm text-gray-600">
                Entre com suas credenciais
            </p>
        </div>
        <form id="login-form" class="mt-8 space-y-6" onsubmit="loginSubmit(event)">
            <div class="hidden p-4 mb-4 text-sm text-red-700 bg-red-100 rounded-lg dark:bg-red-200 dark:text-red-800"
                id="error-message" role="alert">
                <div class="flex items-center">
                    <p>Email ou Senha inválidos</p>
                </div>
            </div>

            <div class="rounded-md shadow-sm -space-y-px">
                <div class="mb-6">
                    <label for="username" class="block text-sm font-medium text-gray-700 mb-2">Usuário</label>
                    <input type="text" id="username" name="username" required
                        class="appearance-none relative block w-full px-3 py-3 border border-gray-300 placeholder-gray-500 text-gray-900 rounded-lg focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 focus:z-10 sm:text-sm"
                        placeholder="Digite seu usuário">
                </div>
                <div class="mb-6">
                    <label for="password" class="block text-sm font-medium text-gray-700 mb-2">Senha</label>
                    <input type="password" id="password" name="password" required
                        class="appearance-none relative block w-full px-3 py-3 border border-gray-300 placeholder-gray-500 text-gray-900 rounded-lg focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 focus:z-10 sm:text-sm"
                        placeholder="Digite sua senha">
                </div>
            </div>

            <button type="submit"
                class="group w-full flex justify-center py-3 px-4 border border-transparent text-sm font-medium rounded-lg text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition duration-150 ease-in-out">

                Entrar
            </button>
        </form>
    </div>
</div></span>
<script>
    const loginSubmit = async (event) => {
        event.preventDefault();
        const form = document.getElementById("login-form");
        const formData = new FormData(form);
        const data = {
            username: formData.get("username"),
            password: formData.get("password"),
        };

        const response = await fetch("/login", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
            },
            body: JSON.stringify(data),
        }).then((res) => {
            if (!res.ok) {
                const errorMessage = document.getElementById("error-message");
                errorMessage.classList.remove("hidden");
                throw new Error('Login error');
            }
            return res.json()
        });
        if (response.token) {
            localStorage.setItem("token", response.token);
            window.location.href = "/";
        } 
    }
</script>

{% endblock %}
