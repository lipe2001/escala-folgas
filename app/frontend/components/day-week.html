{% macro dayweek(day, week,names = []) %}

<div class="flex flex-col  gap-2 rounded-xl">
  <span class="mx-auto w-fit px-5 py-1 border-b mb-2 dates"
    ><div>{{day}}</div>
    {{week}}</span
  >
  {% for name in names %}
  <div class="border-gray-50 border-1 flex flex-col justify-center p-2 shadow {{ "bg-blue-400 hover:bg-blue-500 transition-colors" if name.team == "A" else "bg-amber-200 hover:bg-amber-300 transition-colors" }}  min-h-20  rounded">
    <p class="font-semibold text-black capitalize">{{name.name}}</p>
    <p class="text-gray-800">Equipe {{name.team}}</p>
  </div>

  {% endfor %}
</div>
{%- endmacro %}
